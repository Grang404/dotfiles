$font = GeistMono Nerd Font Mono

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 2, linear
    animation = fadeOut, 1, 2, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor = 
    font_family = $font
    font_color = rgba(c4b8b8ff)

    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = rgba(5c5050ff)
    check_color = rgba(5a7090ff)
    fail_color = rgba(b05050ff)
    capslock_color = rgba(176, 80, 80, 1.0)

    fade_on_empty = false
    rounding = 5

    placeholder_text = Input password...
    fail_text = $FAIL <b>($ATTEMPTS)</b>

    dots_spacing = 0.3
    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor = 
    text = $TIME
    font_size = 90
    font_family = $font
    color = rgba(c4b8b8ff)
    position = 0, 200
    halign = center
    valign = center
}

# DATE
label {
    monitor = 
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font
    color = rgba(c4b8b8ff)
    position = 0, 120
    halign = center
    valign = center
}
