# Pavucontrol
windowrule = float, class:^(org.pulseaudio.pavucontrol)$
windowrule = size 35% 50%, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = move 100%-w-1 25, class:^(org\.pulseaudio\.pavucontrol)$

# Feh
windowrule = float, class:^(feh)$
windowrule = size 50% 50%, class:^(feh)$
windowrulev2 = center, class:^(feh)$

# Ignore maximize requests from apps
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
